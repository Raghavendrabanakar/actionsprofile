name: Build WF

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  pull request:
    branches: [ main ]

  workflow_dispatch:


  schedule:
    - cron: "10  14 * * 1-5" # Runs every day at UTC (10 AM PST) from Monday to Friday

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

       -name: maven build
        run: mvn  install

        Testing:
        runs-on: ubuntu-latest
        needs: build
        steps:
           - name: Checkout
             uses: actions/checkout@v4

            -name: Run tests checkout
             run: mvn test

            -name: checkstyle
             run: mvn checkstyle:checkstyle


      -