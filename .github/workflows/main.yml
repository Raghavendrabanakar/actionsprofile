name: Build WF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Runs at 14:10 UTC, Monday through Friday.
    - cron: "10 14 * * 1-5"

jobs:
  build:
    name: Maven build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and test
        run: mvn --batch-mode clean verify

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: vprofile-war
          path: target/*.war
          if-no-files-found: error
