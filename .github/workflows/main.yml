name: Build Workflow

on:
  push:
    branches: [ main ]

  pull request:
    branches: [ main ]

  workflow_dispatch:


  schedule:
    - cron: "10  14 * * 1-5" # Runs every day at UTC (10 AM PST) from Monday to Friday

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build (mvn install)
        run: mvn -B install

      - name: Checkstyle
        run: mvn -B checkstyle:checkstyle
