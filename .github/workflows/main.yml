name: Build WF
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
       
jobs:
  build:
   runs-on: ubuntu-latest
   steps:
     - name: Checkout code
       uses: actions/checkout@v4

     - name: Maven Build
       run: mvn  install


  Testing:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
       
      - name: run tests on main branch
        run: mvn test

      - name: checkstyle
        run: mvn checkstyle:checkstyle